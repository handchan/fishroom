name: CI / Deploy Fishroom

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compile check — runs on every PR and push. This is the gating check.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Cloud-sync config. These are PUBLIC values (the publishable key ships
      # in the client bundle by design; access is enforced by RLS — see
      # docs/INTEGRATION.md). Repo secrets, if set, override the defaults.
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://gdnwwrzzcetzpofslyoa.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'sb_publishable_k0txbg5wXw55-DyBUTE1Xg_FnwOyjNH' }}
          VITE_AQUARIUM_SLUG: ${{ vars.VITE_AQUARIUM_SLUG || 'hengchengyu' }}
      # Package for Pages only when building the default branch.
      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Deploy to GitHub Pages — only from main, only once Pages is enabled in
  # repo Settings → Pages → Source: GitHub Actions.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
